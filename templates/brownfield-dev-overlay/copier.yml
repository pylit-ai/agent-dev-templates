# Copier config for agentic brownfield overlay
# Apply to an existing repo to add docs governance and spec discipline.
# See https://copier.readthedocs.io/ (March 2025)

_subdirectory: template
_answers_file: .copier-answers.agentic-brownfield.yml

# Load preflight census if present (run repo_census.py --output .agentic-bootstrap.yml first)
_external_data:
  census: .agentic-bootstrap.yml

_message_after_copy: |
  Next: run **repo-os-brownfield-intake** by prompting your agent in this repo (Cursor or Claude). Open a chat, point the agent at AGENTS.md, then use the copy-paste prompt in APPLY.md under "Run intake."
  If you chose not to overwrite any file, see APPLY.md section "If you kept your existing files" for what to add to each.
_message_after_update: |
  Brownfield overlay updated. Re-run **repo-os-brownfield-intake** only if you need to regenerate CURRENT_STATE or the first spec (prompt the agent as in APPLY.md).

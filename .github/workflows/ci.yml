# CI: template copy/update and governance checks
# See notepads/apply/review.md for the four test cases.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  templates:
    name: Copier copy & update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: "1) copier copy greenfield into empty dir"
        run: |
          D=$(mktemp -d)
          uv run copier copy --defaults ./templates/greenfield-dev-os "$D"
          test -f "$D/AGENTS.md"
          test -f "$D/docs/governance/DOCS_SYSTEM.md"
          test -f "$D/.copier-answers.agentic-greenfield.yml"
          echo "Greenfield copy OK"

      - name: "2) greenfield copy + answers file present (update requires published template with git refs)"
        run: |
          D=$(mktemp -d)
          uv run copier copy --defaults ./templates/greenfield-dev-os "$D"
          test -f "$D/AGENTS.md"
          test -f "$D/.copier-answers.agentic-greenfield.yml"
          grep -q _src_path "$D/.copier-answers.agentic-greenfield.yml"
          echo "Greenfield copy OK (update works when template is a git repo with tags)"

      - name: "3) copier copy brownfield into mocked existing repo"
        run: |
          D=$(mktemp -d)
          touch "$D/README.md" "$D/existing-file.txt"
          uv run copier copy --defaults ./templates/brownfield-dev-overlay "$D"
          test -f "$D/AGENTS.md"
          test -f "$D/CURRENT_STATE.md"
          test -f "$D/.copier-answers.agentic-brownfield.yml"
          test -f "$D/existing-file.txt"
          echo "Brownfield copy into existing OK"

      - name: "4) brownfield copy + answers file present (update requires published template with git refs)"
        run: |
          D=$(mktemp -d)
          uv run copier copy --defaults ./templates/brownfield-dev-overlay "$D"
          test -f "$D/MIGRATION_GUARDRAILS.md"
          test -f "$D/.copier-answers.agentic-brownfield.yml"
          grep -q _src_path "$D/.copier-answers.agentic-brownfield.yml"
          echo "Brownfield copy OK (update works when template is a git repo with tags)"

  governance:
    name: Governance checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run governance checks
        run: ./scripts/check-governance
